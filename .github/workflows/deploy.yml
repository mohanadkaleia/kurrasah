name: Deploy demo to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm bug #4828: optional deps (rolldown + rollup native
      # bindings) from a macOS-generated lockfile are skipped on the
      # Linux runner. `npm install` alone honors the broken lockfile;
      # deleting it first is what the npm error message recommends.
      - run: rm -f package-lock.json
      - run: npm install --no-audit --no-fund

      # Build the web demo with the GitHub Pages subpath baked in.
      # `VITE_BASE` is picked up by `web/vite.config.js` → `config.base`
      # and by the Vue Router via `import.meta.env.BASE_URL`.
      - run: npm run build -w web
        env:
          VITE_BASE: /kurrasah/

      # SPA fallback: GitHub Pages serves `404.html` for unknown paths.
      # Copying index.html lets deep links like /docs resolve through
      # the Vue Router.
      - run: cp web/dist/index.html web/dist/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
