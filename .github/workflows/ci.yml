name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm bug #4828: optional deps from a foreign-platform lockfile
      # are skipped — even by `npm install` when the lockfile already
      # exists. rolldown (Vite 8's bundler) and rollup (vitest's)
      # both ship platform-specific native bindings as
      # optionalDependencies, so CI on Linux against a macOS-generated
      # lockfile crashes with "Cannot find native binding". The
      # official workaround per the error message is to delete the
      # lockfile and reinstall. We accept the mild non-determinism
      # that comes with re-resolving on every run for CI only; the
      # tree's semver ranges are tight enough in practice.
      - run: rm -f package-lock.json
      - run: npm install --no-audit --no-fund

      # Run the package's vitest suite. Any failure blocks the workflow
      # and surfaces in the PR before a bad release can reach npm.
      - run: npm run test -w kurrasah

      # Verify the package build is clean. Catches broken imports,
      # missing exports, and config drift independently of the tests.
      - run: npm run build -w kurrasah

      # Verify the web demo builds cleanly. Catches consumer-side
      # integration regressions (alias resolution, router config, etc.).
      - run: npm run build -w web
